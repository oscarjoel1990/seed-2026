<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" role="img" aria-labelledby="seedLogoTitle" fill="none">
  <title id="seedLogoTitle">SEED — encuentro internacional</title>
  <defs>
    <linearGradient id="seedBarGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#274312"/>
      <stop offset="1" stop-color="#8FE057"/>
    </linearGradient>
  </defs>

  <!-- Marca: tres bloques apilados, eco del identificador visual del encuentro -->
  <g>
    <polygon points="0,6 46,6 40,16 0,16" fill="url(#seedBarGradient)"/>
    <polygon points="0,22 46,22 41,32 0,32" fill="url(#seedBarGradient)" opacity="0.92"/>
    <polygon points="0,38 46,38 42,48 0,48" fill="url(#seedBarGradient)" opacity="0.8"/>
  </g>

  <!-- Wordmark -->
  <text x="62" y="40" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="30" letter-spacing="2" fill="#F5F7F1">SEED</text>
</svg>
